<!DOCTYPE html>

<title>Gaby's World</title>

<style>
body{
    margin:0;

.stars{
    position:fixed;
    width:100%;
    height:100%;
    background:url("https://www.transparenttextures.com/patterns/stardust.png");
    animation: moveStars 60s linear infinite;
    z-index:-1;
}

@keyframes moveStars{
    from{
        background-position:0 0;
    }
    to{
        background-position:1000px 1000px;
    }
</style>

</head>

<body>
